# farm_breeding.settings
# All operational defaults. Override per-site via drush config:set or config/install overrides.

# When TRUE, the dam's animal_stage advances to mature_female when a birth log is saved.
# Uses the native farmOS sex field — works for cattle, goats, pigs, sheep, horses, etc.
# Set to FALSE to manage animal_stage manually.
auto_advance_dam_stage: true

# When TRUE, the animal_stage field is set automatically on new Animal assets
# based on the native sex + is_sterile + birthdate fields.
# Animals created via the Birth Quick Form (with sex and birthdate) receive 'juvenile'.
# Animals without a birthdate receive immature_female or intact_male based on sex.
# Set to FALSE to set animal_stage entirely manually.
auto_set_initial_stage: true

# Days after breeding date to suggest a pregnancy check, per species.
# Set to 0 to disable automatic check scheduling for a species.
pregnancy_check_days:
  cattle: 30
  sheep: 30
  goat: 30
  pig: 21
  horse: 14
  alpaca: 45
  llama: 45

